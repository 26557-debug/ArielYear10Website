    <script>


// ===== 幕布视频控制 =====
    const curtainVideo = document.getElementById('curtain-video');
    
    // 确保视频播放并停在最后一帧
    curtainVideo.addEventListener('ended', function() {
        // 视频结束后，移除muted属性（如果需要声音最后一帧）
        // curtainVideo.muted = false; // 如果需要声音取消注释
    });

    // 向下滚动到内容区域的函数
    function scrollToContent() {
        const topicSection = document.querySelector('.topic');
        topicSection.scrollIntoView({ behavior: 'smooth' });
    }

    // 可选：按任意键或点击屏幕也可以向下滚动
    document.addEventListener('keydown', function(event) {
        if (event.key === 'ArrowDown' || event.code === 'Space') {
            event.preventDefault();
            scrollToContent();
        }
    });

    document.addEventListener('click', function() {
        // 如果视频还没结束，点击屏幕就向下滚动
        if (!curtainVideo.ended) {
            scrollToContent();
        }
    });

   
    </script>
